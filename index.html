<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래시 카드 - 단어 학습 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        button, .touch-friendly {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        button:active, .touch-friendly:active {
            transform: scale(0.97);
            transition: transform 0.08s;
        }
        /* 카드 등장 애니메이션 */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* 오답 흔들기 */
        .shake {
            animation: shake 0.45s;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-6px); }
            80%      { transform: translateX(6px); }
        }
        /* 정답 스케일 펄스 */
        .pulse-success {
            animation: pulseSuccess 0.5s;
        }
        @keyframes pulseSuccess {
            0%  { transform: scale(1); }
            50% { transform: scale(1.06); }
            100%{ transform: scale(1); }
        }
        /* 별표 반짝 */
        .star-pop {
            animation: starPop 0.35s ease-out;
        }
        @keyframes starPop {
            0%  { transform: scale(1); }
            50% { transform: scale(1.5) rotate(20deg); }
            100%{ transform: scale(1) rotate(0deg); }
        }
        /* 음소거 버튼 */
        #soundToggleBtn.muted { opacity: 0.45; }
        /* 토스트 */
        .toast {
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 1.8s forwards;
        }
        @keyframes toastIn  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

    <!-- 헤더 -->
    <header class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <h1 class="text-2xl font-bold text-indigo-600">
                    <i class="fas fa-graduation-cap mr-2"></i>플래시 카드
                </h1>
                <nav class="flex items-center gap-2 flex-wrap">
                    <!-- 음소거 토글 -->
                    <button id="soundToggleBtn" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition text-gray-600 touch-friendly" title="효과음 켜기/끄기">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="studyBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition touch-friendly text-sm">
                        <i class="fas fa-play mr-1"></i>학습하기
                    </button>
                    <button id="starStudyBtn" class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition touch-friendly text-sm">
                        <i class="fas fa-star mr-1"></i>별표 학습
                    </button>
                    <button id="manageBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition touch-friendly text-sm">
                        <i class="fas fa-cog mr-1"></i>단어관리
                    </button>
                    <button id="statsBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition touch-friendly text-sm">
                        <i class="fas fa-chart-bar mr-1"></i>통계
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">

        <!-- ══════════════════════════════════════
             학습 모드 (일반 + 별표)
        ══════════════════════════════════════ -->
        <section id="studyMode" class="hidden">
            <div class="max-w-4xl mx-auto">

                <!-- 모드 배너 -->
                <div id="studyModeBanner" class="hidden mb-4 flex items-center gap-2 bg-yellow-50 border border-yellow-300 rounded-xl px-4 py-2 text-yellow-700 font-semibold text-sm">
                    <i class="fas fa-star text-yellow-500"></i>
                    <span>별표 단어 집중 학습 모드</span>
                </div>

                <!-- 진행 바 -->
                <div class="mb-5">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm font-medium text-gray-600">진행률</span>
                        <span id="progressText" class="text-sm font-medium text-gray-600">0/10</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div id="progressBar" class="bg-indigo-500 h-2.5 rounded-full transition-all duration-500" style="width:0%"></div>
                    </div>
                </div>

                <!-- 단어 카드 -->
                <div id="wordCard" class="bg-white rounded-2xl shadow-xl p-8 mb-5 fade-in">
                    <div class="text-center">
                        <div id="categoryBadge" class="mb-3 min-h-6"></div>
                        <div id="wordText" class="text-4xl font-bold text-gray-900 mb-2 tracking-wide"></div>
                    </div>
                </div>

                <!-- 별표 버튼 -->
                <div class="text-center mb-5">
                    <button id="starBtn" class="text-3xl text-gray-300 hover:text-yellow-400 transition touch-friendly">
                        <i class="far fa-star"></i>
                    </button>
                </div>

                <!-- 퀴즈 보기 -->
                <div id="quizSection" class="hidden mb-6">
                    <h3 class="text-lg font-bold text-gray-700 mb-3 text-center">이 단어의 의미는?</h3>
                    <div id="quizOptions" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>

                <!-- 다음 버튼 -->
                <div class="text-center mt-4">
                    <button id="nextBtn"
                        class="px-8 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed font-semibold"
                        disabled>
                        다음 단어 <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- ══════════════════════════════════════
             단어 관리 모드
        ══════════════════════════════════════ -->
        <section id="manageMode" class="hidden">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-5">단어 관리</h2>

                    <!-- 단어 추가 폼 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">단어</label>
                            <input type="text" id="newWord"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">의미</label>
                            <input type="text" id="newMeaning"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>

                    <div class="flex flex-wrap justify-between items-center gap-3">
                        <button id="addWordBtn" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition text-sm">
                            <i class="fas fa-plus mr-1"></i>단어 추가
                        </button>
                        <div class="flex gap-2 flex-wrap">
                            <input type="file" id="fileInput" accept=".txt,.csv" class="hidden">
                            <button id="importBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition text-sm">
                                <i class="fas fa-file-import mr-1"></i>가져오기
                            </button>
                            <button id="exportBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm">
                                <i class="fas fa-file-export mr-1"></i>내보내기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 탭: 전체 / 별표 -->
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <div class="flex items-center gap-3 mb-5 border-b pb-3">
                        <button id="tabAll"
                            class="tab-btn px-4 py-1.5 rounded-full text-sm font-semibold bg-indigo-600 text-white transition">
                            전체
                        </button>
                        <button id="tabStarred"
                            class="tab-btn px-4 py-1.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">
                            <i class="fas fa-star text-yellow-400 mr-1"></i>별표 단어
                            <span id="starredCount" class="ml-1 text-xs bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded-full">0</span>
                        </button>
                    </div>
                    <div id="wordList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    <p id="emptyStarMsg" class="hidden text-gray-400 text-center py-10">
                        <i class="far fa-star text-3xl mb-3 block"></i>
                        별표 표시한 단어가 없습니다.<br>단어 카드의 ☆ 버튼을 눌러 추가해보세요.
                    </p>
                </div>
            </div>
        </section>

        <!-- ══════════════════════════════════════
             통계 모드
        ══════════════════════════════════════ -->
        <section id="statsMode" class="hidden">
            <div class="max-w-6xl mx-auto">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white rounded-2xl shadow-lg p-5 text-center">
                        <div class="text-3xl font-bold text-indigo-600" id="totalWords">0</div>
                        <div class="text-gray-500 text-sm mt-1">총 단어</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg p-5 text-center">
                        <div class="text-3xl font-bold text-yellow-500" id="starredWords">0</div>
                        <div class="text-gray-500 text-sm mt-1">별표 단어</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg p-5 text-center">
                        <div class="text-3xl font-bold text-green-600" id="avgScore">0%</div>
                        <div class="text-gray-500 text-sm mt-1">평균 점수</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg p-5 text-center">
                        <div class="text-3xl font-bold text-purple-600" id="studyDays">0</div>
                        <div class="text-gray-500 text-sm mt-1">학습 일수</div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">최근 학습 기록</h3>
                    <div id="recentSessions" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <!-- ══════════════════════════════════════
             시작 화면
        ══════════════════════════════════════ -->
        <section id="startScreen" class="text-center">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-2xl shadow-xl p-10">
                    <div class="text-6xl mb-5">
                        <i class="fas fa-brain text-indigo-600"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-3">플래시 카드 학습</h1>
                    <p class="text-gray-500 mb-8">어빙하우스 기억곡선을 적용한 지능형 단어 학습</p>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 text-left">
                        <div class="bg-indigo-50 p-4 rounded-xl">
                            <i class="fas fa-sync-alt text-xl text-indigo-500 mb-2"></i>
                            <h3 class="font-semibold text-gray-800 text-sm">지능형 복습</h3>
                            <p class="text-xs text-gray-500 mt-1">어빙하우스 기억곡선 적용</p>
                        </div>
                        <div class="bg-yellow-50 p-4 rounded-xl">
                            <i class="fas fa-star text-xl text-yellow-500 mb-2"></i>
                            <h3 class="font-semibold text-gray-800 text-sm">별표 집중 학습</h3>
                            <p class="text-xs text-gray-500 mt-1">어려운 단어만 따로 연습</p>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-xl">
                            <i class="fas fa-volume-up text-xl text-purple-500 mb-2"></i>
                            <h3 class="font-semibold text-gray-800 text-sm">인터랙티브 효과음</h3>
                            <p class="text-xs text-gray-500 mt-1">정답/오답 즉시 피드백</p>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <button id="startBtn"
                            class="px-8 py-4 bg-indigo-600 text-white text-base font-semibold rounded-xl hover:bg-indigo-700 transition touch-friendly">
                            <i class="fas fa-play mr-2"></i>전체 학습 시작
                        </button>
                        <button id="startStarBtn"
                            class="px-8 py-4 bg-yellow-500 text-white text-base font-semibold rounded-xl hover:bg-yellow-600 transition touch-friendly">
                            <i class="fas fa-star mr-2"></i>별표 단어만 학습
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 모달 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md mx-4 w-full">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-3"></h3>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <div class="flex justify-end gap-2">
                <button id="modalCancel" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">취소</button>
                <button id="modalConfirm" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">확인</button>
            </div>
        </div>
    </div>

    <!-- 토스트 컨테이너 -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 pointer-events-none"></div>

    <script src="js/localStorageDB.js"></script>
    <script src="js/touchHandler.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
