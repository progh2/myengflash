<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래시 카드 - 단어 학습 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 터치 디바이스용 스타일 개선 */
        button, .touch-friendly {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        button:active, .touch-friendly:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .pulse-success {
            animation: pulseSuccess 0.6s;
        }
        @keyframes pulseSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- 헤더 -->
    <header class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-indigo-600">
                    <i class="fas fa-graduation-cap mr-2"></i>플래시 카드
                </h1>
                <nav class="space-x-4">
                    <button id="studyBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition touch-friendly">
                        <i class="fas fa-play mr-2"></i>학습하기
                    </button>
                    <button id="manageBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition touch-friendly">
                        <i class="fas fa-cog mr-2"></i>단어관리
                    </button>
                    <button id="statsBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition touch-friendly">
                        <i class="fas fa-chart-bar mr-2"></i>통계
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 학습 모드 -->
        <section id="studyMode" class="hidden">
            <div class="max-w-4xl mx-auto">
                <!-- 진행 상태 바 -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-gray-700">진행률</span>
                        <span id="progressText" class="text-sm font-medium text-gray-700">0/10</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <!-- 학습 카드 -->
                <div class="bg-white rounded-xl shadow-xl p-8 mb-6">
                    <div class="text-center">
                        <div id="wordText" class="text-4xl font-bold mb-8 text-gray-900"></div>
                    </div>
                </div>

                <!-- 별표 버튼 -->
                <div class="text-center mb-6">
                    <button id="starBtn" class="text-3xl text-gray-400 hover:text-yellow-500 transition">
                        <i class="far fa-star"></i>
                    </button>
                </div>

                <!-- 5지 선다형 답안 -->
                <div id="quizSection" class="hidden">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">이 단어의 의미는?</h3>
                    <div id="quizOptions" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- 답안 버튼들이 동적으로 생성됩니다 -->
                    </div>
                </div>

                <!-- 다음 단어 버튼 -->
                <div class="text-center">
                    <button id="nextBtn" class="px-8 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:bg-gray-400" disabled>
                        다음 단어 <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 단어 관리 모드 -->
        <section id="manageMode" class="hidden">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">단어 관리</h2>
                    
                    <!-- 단어 추가 폼 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">단어</label>
                            <input type="text" id="newWord" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">의미</label>
                            <input type="text" id="newMeaning" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <button id="addWordBtn" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                            <i class="fas fa-plus mr-2"></i>단어 추가
                        </button>
                        <div class="flex space-x-2">
                            <input type="file" id="fileInput" accept=".txt" class="hidden">
                            <button id="importBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                                <i class="fas fa-file-import mr-2"></i>파일 가져오기
                            </button>
                            <button id="exportBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                <i class="fas fa-file-export mr-2"></i>파일 내보내기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 단어 목록 -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">단어 목록</h3>
                    <div id="wordList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- 단어 카드들이 동적으로 생성됩니다 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 통계 모드 -->
        <section id="statsMode" class="hidden">
            <div class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                        <div class="text-3xl font-bold text-indigo-600" id="totalWords">0</div>
                        <div class="text-gray-600">총 단어</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                        <div class="text-3xl font-bold text-green-600" id="starredWords">0</div>
                        <div class="text-gray-600">별표 단어</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                        <div class="text-3xl font-bold text-yellow-600" id="avgScore">0%</div>
                        <div class="text-gray-600">평균 점수</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                        <div class="text-3xl font-bold text-purple-600" id="studyDays">0</div>
                        <div class="text-gray-600">학습 일수</div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">최근 학습 기록</h3>
                    <div id="recentSessions" class="space-y-4">
                        <!-- 학습 기록이 동적으로 생성됩니다 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 시작 화면 -->
        <section id="startScreen" class="text-center">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-xl shadow-xl p-12">
                    <div class="text-6xl mb-6">
                        <i class="fas fa-brain text-indigo-600"></i>
                    </div>
                    <h1 class="text-4xl font-bold text-gray-800 mb-4">플래시 카드 학습</h1>
                    <p class="text-xl text-gray-600 mb-8">어빙하우스 기억곡선을 적용한 지능형 단어 학습</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="bg-indigo-50 p-4 rounded-lg">
                            <i class="fas fa-sync-alt text-2xl text-indigo-600 mb-2"></i>
                            <h3 class="font-semibold text-gray-800">지능형 복습</h3>
                            <p class="text-sm text-gray-600">어빙하우스 기억곡선 적용</p>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg">
                            <i class="fas fa-star text-2xl text-green-600 mb-2"></i>
                            <h3 class="font-semibold text-gray-800">별표 단어</h3>
                            <p class="text-sm text-gray-600">어려운 단어 집중 학습</p>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-lg">
                            <i class="fas fa-chart-line text-2xl text-purple-600 mb-2"></i>
                            <h3 class="font-semibold text-gray-800">학습 통계</h3>
                            <p class="text-sm text-gray-600">진도 추적 및 분석</p>
                        </div>
                    </div>
                    
                    <button id="startBtn" onclick="startStudyDebug()" class="px-8 py-4 bg-indigo-600 text-white text-lg rounded-lg hover:bg-indigo-700 transition">
                        <i class="fas fa-play mr-2"></i>학습 시작하기
                    </button>
                    
                    <!-- 디버깅용 버튼 -->
                    <button onclick="console.log('Debug button clicked'); if(window.app){window.app.startStudy();}else{console.log('App not ready');}" class="px-4 py-2 bg-red-500 text-white rounded mt-4">
                        디버그: 학습 시작
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- 모달 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-8 max-w-md mx-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-4"></h3>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <div class="flex justify-end space-x-2">
                <button id="modalCancel" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">
                    취소
                </button>
                <button id="modalConfirm" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                    확인
                </button>
            </div>
        </div>
    </div>

    <script src="js/localStorageDB.js"></script>
    <script src="js/touchHandler.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 디버깅용 전역 함수
        function startStudyDebug() {
            console.log('startStudyDebug called');
            if (window.app && window.app.startStudy) {
                window.app.startStudy();
            } else {
                console.error('App not ready');
            }
        }
        
        // 수동 시작으로 변경
        // setTimeout은 제거하고 버튼 클릭으로 시작
    </script>
    </script>
</body>
</html>
